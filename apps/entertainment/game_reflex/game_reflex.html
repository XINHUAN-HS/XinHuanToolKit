<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应时间测试 V1.0</title>
    <link rel="stylesheet" href="game_reflex.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>&gt; 反应时间测试 _V1.0</h1>
            <p class="subtitle">点击或者按空格键开始，方块随机变色，看到红色后立即点击</p>
        </header>

        <div class="game-area">
            <div id="reaction">
                <div class="border-container">
                    <div id="reaction-text">
                        <p class="r-main">准备就绪</p>
                        <p>&gt; 点击开始测试</p>
                        <div class="result-in-box" id="reaction-result-in-box">--</div>
                    </div>
                    <div class="color-indicator" id="color-indicator"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="game_reflex.js"></script>
</body>
</html>
