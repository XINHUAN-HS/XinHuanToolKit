<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>弹跳小球 V1.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="game_bounce.css" />
</head>
<body>

  <!-- 左侧标题 -->
  <div class="app-title">弹跳小球 V1.0</div>

  <!-- 右侧球总数控制器 -->
  <div class="ball-counter">
    球总数: <span id="ballCount">40</span>
    <button id="decreaseBtn">▼</button>
    <button id="increaseBtn">▲</button>
  </div>

  <div class="bg emoji"></div>
  <div class="stage emoji"></div>

  <script src="game_bounce.js"></script>
</body>
</html>
