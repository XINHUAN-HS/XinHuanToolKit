<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五子棋 · 黑客帝国</title>
    <link rel="stylesheet" href="game_gobang.css">
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1>五子棋 V1.0</h1>
    </div>

    <!-- 双人对战 · 回合状态 · 人机对战 同一行 -->
    <div class="top-bar">
        <button class="mode-btn active" id="modePvp">双人对战</button>
        <span class="status-text" id="statusText">黑方回合</span>
        <button class="mode-btn" id="modePve">人机对战</button>
    </div>

    <div class="board-wrapper">
        <canvas id="chessboard"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="restartBtn">重新开始</button>
        <button class="btn" id="undoBtn">悔棋</button>
    </div>
</div>

<script src="game_gobang.js"></script>
</body>
</html>
