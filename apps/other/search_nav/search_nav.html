<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索导航</title>
    <link rel="stylesheet" href="search_nav.css">
</head>
<body>
     <div class="search-wrapper">
        <!-- 搜索框 -->
        <div class="search-container">
            <!-- 可点击的左侧区域，用于切换引擎列表 -->
            <div class="left-icons" id="toggleEngineBtn">
                <svg class="magnifier" viewBox="0 0 24 24" focusable="false">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <span class="engine-label" id="engineLabel">Google</span>
            </div>
            <input type="text" class="search-input" id="queryInput" placeholder="搜索你想要的…" autofocus />
        </div>

        <!-- 引擎按钮列表（默认隐藏） -->
        <div class="engine-selector" id="engineSelector"></div>
    </div>
    <script src="search_nav.js"></script>
</body>
</html>
