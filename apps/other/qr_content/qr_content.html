<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪切板内容查看工具 v1.0</title>
    <link rel="stylesheet" href="qr_content.css">
</head>
<body>
    <div class="container">
        <!-- 头部标题 -->
        <header class="header">
            <h1>> 剪切板内容查看工具 v1.0</h1>
            <p class="subtitle">[系统] 等待粘贴内容...</p>
        </header>

        <!-- 粘贴区域 -->
        <main class="drop-zone" id="dropZone" contenteditable="true">
            <div class="icon">📋</div>
            <p class="hint">点击此处或按 <kbd>Ctrl+V</kbd> / <kbd>⌘+V</kbd> 粘贴</p>
            <p class="sub-hint">支持文本、图片、文件等多种格式</p>
        </main>

        <!-- 结果展示区域 -->
        <section class="results" id="results"></section>
    </div>

    <script src="qr_content.js"></script>
</body>
</html>
